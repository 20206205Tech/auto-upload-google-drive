name: run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      gmail_address:
        description: "Optional Gmail address to refresh. Defaults to GOOGLE_REFRESH_GMAIL in Doppler."
        required: false
        type: string
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Show help
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          DATABASE_URL: postgresql://user:pass@localhost/db
        run: uv run python main.py --help

      - name: Refresh Google token
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GMAIL_ADDRESS: ${{ inputs.gmail_address }}
        run: |
          if [ -n "$GMAIL_ADDRESS" ]; then
            doppler run -p auto-upload-google-drive -c prod -- uv run python main.py refresh --gmail-address "$GMAIL_ADDRESS"
          else
            doppler run -p auto-upload-google-drive -c prod -- uv run python main.py refresh
          fi
