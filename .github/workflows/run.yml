name: run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose command to run"
        required: true
        type: choice
        options:
          - auth-url
          - save-google-account
      google_code:
        description: "Paste code=... from Google redirect URL. Required for save-google-account."
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Show help
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -p auto-upload-google-drive -c prod -- uv run python main.py --help

      - name: Print Google authorization URL
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'auth-url'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -p auto-upload-google-drive -c prod -- uv run python main.py auth-url

      - name: Save Google account token to database
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'save-google-account'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GOOGLE_CODE: ${{ inputs.google_code }}
        run: |
          if [ -z "$GOOGLE_CODE" ]; then
            echo "google_code is required for save-google-account"
            exit 1
          fi

          doppler run -p auto-upload-google-drive -c prod -- uv run python main.py save-google-account --code "$GOOGLE_CODE"
